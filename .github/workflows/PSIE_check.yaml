name: PSIE Scut - Motor Activ
on: [push, workflow_dispatch]
jobs:
  psie_motor:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout cod
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Activare PSIE
        run: |
          echo "SANTINELA HIDRA ACTIVA"
          echo "J=700.0"
          echo "SDI=0.00"
          echo "--- PSIE MOTOR START ---"
          python Hidra_core.deployed.py
          echo "--- PSIE MOTOR END ---"
