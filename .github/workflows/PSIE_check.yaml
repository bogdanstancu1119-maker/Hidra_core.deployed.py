name: PSIE Scut - Oglinda in Brate

on:
  push:
    branches:
      - main
  workflow_dispatch: {}

jobs:
  psie_verificare:
    runs-on: ubuntu-latest
    steps:
      - name: Santinela HIDRA Activa
        shell: bash
        run: |
          echo "SANTINELA HIDRA ACTIVA"
          echo "J=700.0"
          echo "SDI=0.00"
          echo "STATUS: SCUT SUS"
          echo "DATA: $(date -u +'%Y-%m-%dT%H:%M:%SZ')"
