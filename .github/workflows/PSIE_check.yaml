name: PSIE Scut - Motor Activ

on: [push, workflow_dispatch]

jobs:
  psie_motor:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4  # ← Trebuie v4.2+ pentru Node 24

      - name: Setup Python
        uses: actions/setup-python@v5  # ← Trebuie v5.3+ pentru Node 24
        with:
          python-version: '3.11'
