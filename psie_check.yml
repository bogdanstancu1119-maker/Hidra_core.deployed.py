name: PSIE Scut - Oglinda in Brate

on:
  push:
    branches: [ main ]

jobs:
  psie_verificare:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout cod
      uses: actions/checkout@v4

    - name: Verifica fisiere PSIE
      run: ls -la

    - name: Setup Python 3.9
      uses: actions/setup-python@v5
      with:
        python-version: '3.9'

    - name: Ruleaza Test Integritate PSIE
      run: python./PSIE_core.py --test

    - name: Ruleaza Oglinda pe toate Releele
      run: python./PSIE_activate.py
