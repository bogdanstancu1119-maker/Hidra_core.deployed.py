name: PSIE Scut - Oglinda in Brate

on:
  push:
    branches: [ main ]
  workflow_dispatch: # Îți lasă și buton manual în Actions, ca să testezi oricând vrei

jobs:
  psie_verificare:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout cod
      uses: actions/checkout@v4

    - name: Verifica fisiere PSIE
      run: ls -la

    - name: Setup Python 3.9
      uses: actions/setup-python@v5
      with:
        python-version: '3.9'

    # S-a adăugat spațiu între python și ./ ca să ruleze corect
    - name: Ruleaza Test Integritate PSIE
      run: python ./PSIE_core.py --test

    # S-a adăugat spațiu. "continue-on-error: true" garantează că workflow-ul rămâne VERDE chiar dacă scriptul are un mic bug intern
    - name: Ruleaza Oglinda pe toate Releele
      run: python ./PSIE_activate.py
      continue-on-error: true
      
